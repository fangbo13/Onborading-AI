services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowpilot
      POSTGRES_USER: knowpilot
      POSTGRES_PASSWORD: knowpilot_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    # V4.6: gunicorn with threaded workers replaces runserver so concurrent SSE chat
    # streams don't block each other (each reply holds a worker thread for its whole
    # duration). 2 workers x 8 threads = 16 concurrent streams. --reload keeps dev
    # auto-reload. --timeout 120 > the app-level 60s SSE limit so long replies aren't killed.
    command:
      - sh
      - -c
      - "python manage.py migrate --no-input && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 8 --worker-class gthread --timeout 120 --graceful-timeout 30 --reload"
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    command: celery -A config worker -l info -c 4
    volumes:
      - ./backend:/app
      - media_volume:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: final
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3003:80"
    depends_on:
      - backend

volumes:
  pgdata:
  media_volume:
