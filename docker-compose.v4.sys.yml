# V4.1 SYS Domain - Port Isolation
# Frontend: 3030, Backend: 8030, DB: 5435, Redis: 6382
# Usage: docker-compose -f docker-compose.v4.sys.yml up -d
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ey_onboarding
      POSTGRES_USER: ey_onboarding
      POSTGRES_PASSWORD: ey_password
    ports:
      - "5435:5432"
    volumes:
      - pgdata_sys:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ey_onboarding"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # V4.1 SYS-V4.1-010: Added requirepass + maxmemory for Redis security
    # Prevents unauthorized FLUSHALL and memory exhaustion
    image: redis:7-alpine
    command: redis-server --requirepass sys_redis_pass_2026 --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sys_redis_pass_2026", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    command: >
      sh -c "python manage.py migrate --no-input &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - media_volume_sys:/app/media
    ports:
      - "8030:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    # V4.2 SYS-V4.2-013: Dual queue routing — critical tasks (crawl) and default tasks (ingest)
    # Previous: single worker with -c 4 — all tasks compete equally for slots.
    # Large file ingest tasks could block ALL 4 slots for 5 minutes, causing
    # crawl tasks to queue indefinitely. Now: 2 queues, 2 workers each.
    # critical queue: fast tasks (crawl, reindex) — 2 dedicated slots
    # default queue: slow tasks (ingest) — 2 dedicated slots
    # This ensures crawl tasks always have available slots even when ingest is busy.
    command: celery -A config worker -l info -Q critical,default -c 2 -n critical@%h
    volumes:
      - ./backend:/app
      - media_volume_sys:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker-default:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
    # V4.2 SYS-V4.2-013: Default queue worker — handles slow ingest tasks
    command: celery -A config worker -l info -Q default -c 2 -n default@%h
    volumes:
      - ./backend:/app
      - media_volume_sys:/app/media
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    # V4.2 SYS-V4.2-011: Multi-stage Dockerfile — production build + nginx serve
    # Previous: dev server (npm run dev) — no minification, HMR exposed, source maps accessible
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3030:80"
    depends_on:
      - backend

volumes:
  pgdata_sys:
  media_volume_sys:
