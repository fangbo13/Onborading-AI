<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Server Error</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .error-container { max-width: 600px; margin: 100px auto; padding: 40px; text-align: center; }
        .error-title { font-size: 24px; color: #333; margin-bottom: 16px; }
        .error-message { font-size: 16px; color: #666; margin-bottom: 24px; }
        .error-contact { font-size: 14px; color: #999; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1 class="error-title">Internal Server Error</h1>
        <p class="error-message">An unexpected error occurred. Please try again later.</p>
        <p class="error-contact">If the problem persists, please contact your HR buddy or HR team.</p>
    </div>
</body>
</html>
